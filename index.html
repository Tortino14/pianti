<!DOCTYPE html>
<html>
<head>
<title>Paint Multiplayer</title>

<style>
body { font-family: Arial; margin:0; background:#a7d8ff; overflow:hidden; }

#lobby {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#paintPage { display:none; }

canvas { border:1px solid black; background:white; }

.tools { position:absolute; left:10px; top:10px; width:180px; }

#chatBox {
  position:fixed;
  right:10px;
  bottom:50px;
  width:260px;
  height:200px;
  background:#ccffcc;
  overflow-y:auto;
  padding:5px;
}

#chatInput {
  position:fixed;
  right:70px;
  bottom:10px;
  width:170px;
}

#sendBtn {
  position:fixed;
  right:10px;
  bottom:10px;
  width:55px;
}

#roomLabel {
  position:absolute;
  top:10px;
  left:10px;
  background:#fff3;
  padding:5px;
}
</style>

<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>Paint Multiplayer</h1>
  <input id="username" placeholder="Username"><br>
  <input id="roomInput" placeholder="Room code"><br>
  <button onclick="createRoom()">Create</button>
  <button onclick="joinRoom()">Join</button>
</div>

<!-- PAINT -->
<div id="paintPage">

<div id="roomLabel">Room: -</div>

<canvas id="canvas" width="800" height="600"></canvas>

<div class="tools">
  <input type="color" id="color">
  <input type="range" id="size" min="1" max="50" value="3">

  <button onclick="tool='brush'">Brush</button>
  <button onclick="tool='eraser'">Eraser</button>
  <button onclick="tool='rect'">Rect</button>
  <button onclick="tool='circle'">Circle</button>
  <button onclick="tool='fill'">Fill</button>

  <button onclick="clearCanvas()">Clear</button>
</div>

<div id="chatBox"></div>
<input id="chatInput">
<button id="sendBtn" onclick="sendChat()">Send</button>

</div>

<script>
const socket = io();

let username="", room="";
let tool="brush";

const lobby = document.getElementById("lobby");
const paintPage = document.getElementById("paintPage");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing=false;
let startX,startY;

/* ---------------- LOBBY ---------------- */
function createRoom(){
  username=document.getElementById("username").value||"Anon";
  room=Math.random().toString(36).substring(2,7);
  start();
}

function joinRoom(){
  username=document.getElementById("username").value||"Anon";
  room=document.getElementById("roomInput").value;
  start();
}

function start(){
  lobby.style.display="none";
  paintPage.style.display="block";

  document.getElementById("roomLabel").innerText="Room: "+room;

  socket.emit("joinRoom",{room,username});
}

/* ---------------- CHAT ---------------- */
function sendChat(){
  const msg=document.getElementById("chatInput").value;
  socket.emit("chat",{room,message:username+": "+msg});
  document.getElementById("chatInput").value="";
}

socket.on("chat",(d)=>{
  const div=document.createElement("div");
  div.textContent=d.message;
  document.getElementById("chatBox").appendChild(div);
});

/* ---------------- DRAW ---------------- */
canvas.onmousedown=(e)=>{
  drawing=true;
  const r=canvas.getBoundingClientRect();
  startX=e.clientX-r.left;
  startY=e.clientY-r.top;
};

canvas.onmouseup=(e)=>{
  drawing=false;

  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left;
  const y=e.clientY-r.top;

  const color=document.getElementById("color").value;
  const size=document.getElementById("size").value;

  ctx.strokeStyle=color;
  ctx.lineWidth=size;

  if(tool==="rect"){
    ctx.strokeRect(startX,startY,x-startX,y-startY);
    socket.emit("shape",{room,type:"rect",startX,startY,x,y,color,size});
  }

  if(tool==="circle"){
    const radius=Math.hypot(x-startX,y-startY);
    ctx.beginPath();
    ctx.arc(startX,startY,radius,0,Math.PI*2);
    ctx.stroke();
    socket.emit("shape",{room,type:"circle",startX,startY,x,y,color,size});
  }
};

canvas.onmousemove=(e)=>{
  if(!drawing) return;

  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left;
  const y=e.clientY-r.top;

  const color=document.getElementById("color").value;
  const size=document.getElementById("size").value;

  ctx.lineWidth=size;
  ctx.lineCap="round";
  ctx.strokeStyle=(tool==="eraser")?"white":color;

  if(tool==="brush"||tool==="eraser"){
    ctx.lineTo(x,y);
    ctx.stroke();

    socket.emit("draw",{room,x,y,color,tool,size});
  }
};

/* ---------------- RECEIVE ---------------- */
socket.on("draw",(d)=>{
  ctx.lineWidth=d.size;
  ctx.lineCap="round";
  ctx.strokeStyle=(d.tool==="eraser")?"white":d.color;
  ctx.lineTo(d.x,d.y);
  ctx.stroke();
});

socket.on("shape",(d)=>{
  ctx.strokeStyle=d.color;
  ctx.lineWidth=d.size;

  if(d.type==="rect")
    ctx.strokeRect(d.startX,d.startY,d.x-d.startX,d.y-d.startY);

  if(d.type==="circle"){
    const r=Math.hypot(d.x-d.startX,d.y-d.startY);
    ctx.beginPath();
    ctx.arc(d.startX,d.startY,r,0,Math.PI*2);
    ctx.stroke();
  }
});

/* CLEAR */
function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  socket.emit("clear",room);
}

socket.on("clear",()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
});
</script>

</body>
</html>
