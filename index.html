<!DOCTYPE html>
<html>
<head>
<title>Paint Multiplayer</title>
<style>
body { font-family: Arial; margin: 0; background-color: #a7d8ff; overflow: hidden; }

.container { display: flex; gap: 10px; align-items: flex-start; padding: 10px; }
.tools { width: 180px; }
button { width: 100%; margin: 4px 0; }
canvas { border: 1px solid black; background: white; }

/* CHAT BOX */
#chatBox { position: fixed; bottom: 10px; right: 10px; width: 260px; height: 220px; background-color: #ccffcc; border: 1px solid gray; padding: 5px; overflow-y: auto; font-size: 14px; }
#chatInput { position: fixed; bottom: 5px; right: 70px; width: 180px; }
#sendBtn { position: fixed; bottom: 5px; right: 10px; width: 55px; }

/* LOBBY */
#lobby { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; }
#lobby input { padding:8px; margin:5px; width:200px; }
#lobby button { padding:10px 20px; margin:5px; cursor:pointer; }

/* ROOM CODE DISPLAY */
#roomLabel { position:absolute; top:10px; left:10px; font-size:18px; font-weight:bold; color:#333; background:#fff3; padding:5px 10px; border-radius:5px; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>Paint Multiplayer</h1>
  <input id="username" placeholder="Username">
  <input id="roomInput" placeholder="Room code">
  <button id="createBtn">Create Room</button>
  <button id="joinBtn">Join Room</button>
</div>

<!-- PAINT PAGE -->
<div id="paintPage" style="display:none;">
  <div id="roomLabel">Room: -</div>
  <div class="container">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div class="tools">
      <h3>Tools</h3>
      <input type="color" id="color" value="#000000"><br><br>
      <label>Size</label>
      <input type="range" id="size" min="1" max="50" value="3"><br><br>
      <button onclick="setTool('brush')">Brush</button>
      <button onclick="setTool('eraser')">Eraser</button>
      <button onclick="setTool('rect')">Rectangle</button>
      <button onclick="setTool('circle')">Circle</button>
      <button onclick="setTool('fill')">Fill</button>
      <br>
      <button onclick="undo()">Undo</button>
      <button onclick="redo()">Redo</button>
      <br>
      <button onclick="clearCanvas()">Clear</button>
      <button onclick="savePNG()">Save PNG</button>
    </div>
  </div>

  <div id="chatBox"></div>
  <input id="chatInput" placeholder="write message...">
  <button id="sendBtn">send</button>
</div>

<script>
/* ---------------- LOBBY ---------------- */
const lobby = document.getElementById("lobby");
const paintPage = document.getElementById("paintPage");
const createBtn = document.getElementById("createBtn");
const joinBtn = document.getElementById("joinBtn");
const usernameInput = document.getElementById("username");
const roomInput = document.getElementById("roomInput");
const roomLabel = document.getElementById("roomLabel");

let username = "";
let roomCode = "";

createBtn.onclick = () => {
    username = usernameInput.value.trim() || "Anonymous";
    roomCode = Math.random().toString(36).substring(2,8).toUpperCase();
    startPaint();
};

joinBtn.onclick = () => {
    username = usernameInput.value.trim() || "Anonymous";
    roomCode = roomInput.value.trim().toUpperCase();
    if(!roomCode) return alert("Enter a room code!");
    startPaint();
};

function startPaint(){
    lobby.style.display = "none";
    paintPage.style.display = "block";
    roomLabel.textContent = "Room: " + roomCode;
}

/* ---------------- ORIGINAL PAINT CODE ---------------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorPicker = document.getElementById("color");
const sizePicker = document.getElementById("size");

let tool = "brush";
let drawing = false;
let startX, startY;

let undoStack = [];
let redoStack = [];

function saveState() {
    undoStack.push(canvas.toDataURL());
    redoStack = [];
}

function restoreState(stack, opposite) {
    if (!stack.length) return;
    opposite.push(canvas.toDataURL());
    const img = new Image();
    img.src = stack.pop();
    img.onload = () => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0);
    };
}

ctx.fillStyle = "white";
ctx.fillRect(0,0,canvas.width,canvas.height);

function setTool(t){ tool = t; }

canvas.addEventListener("mousedown",(e)=>{
    drawing = true;
    const r = canvas.getBoundingClientRect();
    startX = e.clientX - r.left;
    startY = e.clientY - r.top;

    if(tool === "fill"){
        floodFill(startX,startY,hexToRgb(colorPicker.value));
        saveState();
        drawing = false;
        return;
    }

    ctx.beginPath();
    ctx.moveTo(startX,startY);
});

canvas.addEventListener("mouseup",(e)=>{
    if(!drawing) return;
    drawing = false;
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = sizePicker.value;

    if(tool === "rect") ctx.strokeRect(startX,startY,x-startX,y-startY);
    if(tool === "circle"){
        const radius = Math.hypot(x-startX,y-startY);
        ctx.beginPath();
        ctx.arc(startX,startY,radius,0,Math.PI*2);
        ctx.stroke();
    }

    saveState();
});

canvas.addEventListener("mousemove",(e)=>{
    if(!drawing) return;
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    ctx.lineWidth = sizePicker.value;
    ctx.lineCap = "round";
    ctx.strokeStyle = (tool === "eraser") ? "white" : colorPicker.value;

    if(tool === "brush" || tool === "eraser"){
        ctx.lineTo(x,y);
        ctx.stroke();
    }
});

/* ---------------- CHAT ---------------- */
const chatBox = document.getElementById("chatBox");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");

function sendMessage(){
    if(chatInput.value.trim()==="") return;
    const msg = document.createElement("div");
    msg.textContent = username + ": " + chatInput.value;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    chatInput.value = "";
}

sendBtn.onclick = sendMessage;
chatInput.addEventListener("keypress",(e)=>{ if(e.key==="Enter") sendMessage(); });

/* ---------------- TOOLS ---------------- */
function undo(){ restoreState(undoStack,redoStack); }
function redo(){ restoreState(redoStack,undoStack); }

function clearCanvas(){
    saveState();
    ctx.fillStyle="white";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function savePNG(){
    const a = document.createElement("a");
    a.download="drawing.png";
    a.href=canvas.toDataURL();
    a.click();
}

/* ---------------- FLOOD FILL ---------------- */
function floodFill(x,y,color){
    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    const data = img.data;
    const start = getPixel(data,x,y);
    if(colorsMatch(start,color)) return;
    const stack = [[x,y]];
    while(stack.length){
        const [cx,cy] = stack.pop();
        const i = (cy*canvas.width+cx)*4;
        const c = {r:data[i],g:data[i+1],b:data[i+2]};
        if(!colorsMatch(c,start)) continue;
        data[i]=color.r; data[i+1]=color.g; data[i+2]=color.b;
        if(cx>0) stack.push([cx-1,cy]);
        if(cx<canvas.width-1) stack.push([cx+1,cy]);
        if(cy>0) stack.push([cx,cy-1]);
        if(cy<canvas.height-1) stack.push([cx,cy+1]);
    }
    ctx.putImageData(img,0,0);
}

function getPixel(d,x,y){
    const i=(y*canvas.width+x)*4;
    return {r:d[i],g:d[i+1],b:d[i+2]};
}

function colorsMatch(a,b){ return a.r===b.r && a.g===b.g && a.b===b.b; }
function hexToRgb(h){
    return { r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) };
}
</script>
</body>
</html>
